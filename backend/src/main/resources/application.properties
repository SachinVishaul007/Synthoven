# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/chopdb;MODE=PostgreSQL
spring.datasource.username=chop
spring.datasource.password=chop
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# ─── CORS ─────────────────────────────────────────────────────────────────────
chop.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3333,http://127.0.0.1:3333}

# ─── Library ──────────────────────────────────────────────────────────────────
# Comma-separated list of folders to auto-scan on startup
chop.library.scan-paths=${LIBRARY_SCAN_PATHS:~/Music,~/Downloads/Samples,~/Desktop/Samples}

# Supported audio formats
chop.library.supported-formats=${LIBRARY_FORMATS:wav,mp3,aiff,flac}

# How often to re-scan folders for new files (in milliseconds, 0 = only on startup)
chop.library.scan-interval-ms=${LIBRARY_SCAN_INTERVAL:0}

# Where uploaded files (via POST /api/library/upload) are stored
chop.library.upload-path=${LIBRARY_UPLOAD_PATH:~/Music/Chop/Uploads}

# ─── Uploads ──────────────────────────────────────────────────────────────────
# Allow uploading whole folders of audio files in one request
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:1GB}

# ─── Generation ───────────────────────────────────────────────────────────────
chop.generation.provider=${GENERATION_PROVIDER:localstableaudio}
chop.generation.suno.api-key=${SUNO_API_KEY:}
chop.generation.suno.base-url=${SUNO_BASE_URL:https://api.suno.com}
chop.generation.suno.poll-interval-ms=${SUNO_POLL_INTERVAL:3000}
chop.generation.suno.max-poll-attempts=${SUNO_MAX_POLL:20}

# Stable Audio (Stability AI) — set GENERATION_PROVIDER=stableaudio to use it.
# endpoint-path/model are configurable so the same client can target Stable
# Audio 2 / 2.5 / 3 or a partner gateway without code changes.
chop.generation.stableaudio.api-key=${STABILITY_API_KEY:}
chop.generation.stableaudio.base-url=${STABILITY_BASE_URL:https://api.stability.ai}
chop.generation.stableaudio.endpoint-path=${STABILITY_ENDPOINT_PATH:/v2beta/audio/stable-audio-2/text-to-audio}
chop.generation.stableaudio.duration-seconds=${STABILITY_DURATION:12}
chop.generation.stableaudio.steps=${STABILITY_STEPS:8}
chop.generation.stableaudio.cfg-scale=${STABILITY_CFG_SCALE:7.0}
chop.generation.stableaudio.output-format=${STABILITY_OUTPUT_FORMAT:wav}
chop.generation.stableaudio.request-timeout-ms=${STABILITY_TIMEOUT_MS:120000}

# Local, open-source Stable Audio 3 via its `stable-audio` CLI (no API key).
# Set GENERATION_PROVIDER=localstableaudio to use it. The Small-Music/SFX
# weights are gated on HuggingFace — accept the licence once and supply a token
# via HF_TOKEN (env) or chop.generation.localstableaudio.hf-token.
chop.generation.localstableaudio.uv-path=${LOCAL_SA_UV_PATH:C:/Users/91974/AppData/Local/Programs/Python/Python314/Scripts/uv.exe}
chop.generation.localstableaudio.repo-dir=${LOCAL_SA_REPO_DIR:~/stable-audio-3}
chop.generation.localstableaudio.model=${LOCAL_SA_MODEL:small-music}
chop.generation.localstableaudio.duration-seconds=${LOCAL_SA_DURATION:10}
chop.generation.localstableaudio.steps=${LOCAL_SA_STEPS:8}
chop.generation.localstableaudio.cfg-scale=${LOCAL_SA_CFG_SCALE:1.0}
chop.generation.localstableaudio.device=${LOCAL_SA_DEVICE:}
chop.generation.localstableaudio.hf-token=${HF_TOKEN:}
chop.generation.localstableaudio.timeout-ms=${LOCAL_SA_TIMEOUT_MS:300000}

# Where to save generated samples locally
chop.generation.output-path=${GENERATION_OUTPUT_PATH:~/Music/Chop/Generated}

# ─── Search ───────────────────────────────────────────────────────────────────
chop.search.max-results=${SEARCH_MAX_RESULTS:50}
chop.search.min-score=${SEARCH_MIN_SCORE:0.3}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.chopaudio=INFO
logging.level.org.springframework.web=WARN